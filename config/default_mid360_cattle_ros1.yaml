# MID360 + IMU ROS1 Noetic cattle-farm default configuration.
common:
  dataset: "mid360_cattle"
  lidar_topic: "/livox/lidar_points"
  livox_lidar_topic: "/livox/lidar"
  imu_topic: "/livox/imu"

frames:
  map: "map"
  odom: "odom"
  base_link: "base_link"
  livox_frame: "livox_frame"

fasterlio:
  lidar_type: 1
  scan_line: 32
  blind: 0.1
  time_scale: 1e-3
  skip_lidar_num: 0
  point_filter_num: 4
  max_iteration: 4
  filter_size_scan: 0.5
  filter_size_map: 0.5
  ivox_grid_resolution: 0.5
  ivox_nearby_type: 18
  esti_plane_threshold: 0.1
  use_aa: false
  acc_cov: 0.1
  gyr_cov: 0.1
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001
  extrinsic_est_en: false
  extrinsic_T: [0, 0, 0.28]
  extrinsic_R: [1, 0, 0,
                0, 1, 0,
                0, 0, 1]
  keep_first_imu_estimation: false
  kf_dis_th: 1.0
  kf_angle_th: 10.0
  enable_icp_part: false
  plane_icp_weight: 300.0
  min_pts: 500
  imu_filter: false
  proj_kfs: false

g2p5:
  esti_floor: false
  lidar_height: 0.0
  floor_height: -1.2
  min_th_floor: 0.50
  max_th_floor: 1.0
  grid_map_resolution: 0.2

system:
  with_loop_closing: true
  with_ui: true
  with_2dui: false
  with_g2p5: true
  step_on_kf: false
  enable_lidar_loc_skip: false
  enable_lidar_loc_rviz: false
  enable_lidar_odom_skip: false
  evaluation: false
  evaluation_output_dir: ./data/evaluation
  lidar_loc_skip_num: 4
  lidar_odom_skip_num: 2
  map_path: ./data/new_map/
  pub_tf: true

loop_closing:
  loop_kf_gap: 20
  min_id_interval: 20
  closest_id_th: 50
  max_range: 20.0
  ndt_score_th: 1.3
  with_height: false
  height_noise: 0.1
  lidar_auto_pgo_trial_commit:
    enable: true
  lidar_auto_risk_combo_gate:
    enable: true
    reject_low_score_margin_and_large_correction: true
    reject_low_score_margin_and_near_max_range: true
    reject_low_score_margin_and_local_pose_delta_large: true
    reject_large_correction_and_near_max_range: true
    low_score_margin_th: 0.3
    near_max_range_ratio: 0.8
    large_correction_trans_m: 0.8
    large_correction_yaw_deg: 10.0
    local_pose_delta_large_m: 0.3

lidar_loc:
  enable_dynamic_polygon: false
  enable_parking_static: true
  enable_icp_adjust: false
  filter_intensity_max: 100.0
  filter_intensity_min: 10.0
  filter_z_max: 30.0
  filter_z_min: -1.0
  force_2d: false
  grid_search_angle_range: 180.0
  grid_search_angle_step: 60
  lidar_loc_odom_th: 0.5
  init_with_fp: true
  min_init_confidence: 1.8
  update_dynamic_cloud: false
  update_err_h: 0.2
  update_err_v: 0.2
  update_kf_dis: 2.0
  update_lidar_loc_score: 2.5
  loc_on_kf: true
  try_self_extrap: false

maps:
  delete_when_unload: false
  dyn_cloud_policy: persistent
  load_dyn_cloud: true
  load_map_size: 2
  max_pts_dyn_chunk: 100000
  save_dyn_when_quit: true
  save_dyn_when_unload: false
  unload_map_size: 4
  with_dyn_area: false

pgo:
  dr_ang_noise: 0.5
  dr_pos_noise: 1.0
  dr_pos_noise_ratio: 1.0
  lidar_loc_ang_noise: 1.0
  lidar_loc_outlier_th: 5.0
  lidar_loc_pos_noise: 0.3
  lidar_odom_ang_noise: 1.0
  lidar_odom_pos_noise: 0.3
  pgo_frame_converge_ang_th: 1.0
  pgo_frame_converge_pos_th: 0.05
  rtk_fix_ang_noise: 2.0
  rtk_fix_pos_noise: 1.0
  rtk_height_noise_ratio: 10.0
  rtk_other_ang_noise: 10.0
  rtk_other_pos_noise: 5.0
  rtk_outlier_th: 1.0
  smooth_factor: 0.01

roi:
  height_max: 10.0
  height_min: 0.5
  range_max: 70
  range_min: 3.0

ui:
  car_length: 2.0
  car_width: 1.6
  car_height: 1.7
  scans: 1
